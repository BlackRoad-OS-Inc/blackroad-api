services:
  api:
    build: .
    ports: ["3000:3000"]
    environment:
      - NODE_ENV=production
      - BLACKROAD_GATEWAY_URL=http://gateway:8787
    depends_on: [gateway]
    restart: unless-stopped

  gateway:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && node index.js"
    ports: ["8787:8787"]
    volumes: ["./gateway:/app"]
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: ["qdrant_data:/qdrant/storage"]
    restart: unless-stopped

volumes:
  qdrant_data:
