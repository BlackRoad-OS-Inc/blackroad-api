version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - BLACKROAD_GATEWAY_URL=${BLACKROAD_GATEWAY_URL:-http://gateway:8787}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      - gateway
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  gateway:
    image: node:20-alpine
    working_dir: /app
    command: node gateway/server.js
    ports:
      - "8787:8787"
    environment:
      - BLACKROAD_GATEWAY_BIND=0.0.0.0
      - BLACKROAD_GATEWAY_PORT=8787
    restart: unless-stopped

networks:
  default:
    name: blackroad-net
