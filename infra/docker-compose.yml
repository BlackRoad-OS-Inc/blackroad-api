version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql://blackroad:blackroad@db:5432/blackroad
      - GATEWAY_URL=http://gateway:8787
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: blackroad
      POSTGRES_USER: blackroad
      POSTGRES_PASSWORD: blackroad
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blackroad"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    image: ghcr.io/blackroad-os-inc/blackroad-gateway:latest
    ports:
      - "8787:8787"
    environment:
      - GATEWAY_BIND=0.0.0.0
      - GATEWAY_PORT=8787
    restart: unless-stopped
    profiles:
      - full

volumes:
  pgdata:
