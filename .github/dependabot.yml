version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    labels:
      - "dependencies"
      - "python"
      - "automerge"
    open-pull-requests-limit: 10
    groups:
      python-deps:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    labels:
      - "dependencies"
      - "github-actions"
      - "automerge"
    open-pull-requests-limit: 10

  # Cloudflare Worker npm deps
  - package-ecosystem: "npm"
    directory: "/workers/task-dispatcher"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    labels:
      - "dependencies"
      - "javascript"
      - "automerge"
    open-pull-requests-limit: 5
