name: 🚀 Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        type: choice
        options: [cloudflare, railway, vercel, all]
        default: all

jobs:
  deploy-railway:
    name: Deploy API → Railway
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: |
      github.event_name == 'push' ||
      inputs.target == 'railway' ||
      inputs.target == 'all'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Deploy to Railway
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "⚠ RAILWAY_TOKEN not set — skipping Railway deploy"
            exit 0
          fi
          if command -v railway &>/dev/null; then
            railway up --service "${{ github.event.repository.name }}"
          else
            npm install -g @railway/cli --quiet 2>/dev/null && \
              railway up --service "${{ github.event.repository.name }}" || \
              echo "Railway deploy skipped (CLI install failed)"
          fi
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-cloudflare:
    name: Deploy CF Worker → Cloudflare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: |
      github.event_name == 'push' ||
      inputs.target == 'cloudflare' ||
      inputs.target == 'all'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: workers/task-dispatcher/package-lock.json

      - name: Install worker dependencies
        working-directory: workers/task-dispatcher
        run: npm ci

      - name: Deploy to Cloudflare Workers
        if: env.CLOUDFLARE_API_TOKEN != ''
        working-directory: workers/task-dispatcher
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || '848cf0b18d51e0170e0d1537aec3505a' }}

      - name: Skip CF deploy (no token)
        if: env.CLOUDFLARE_API_TOKEN == ''
        run: echo "⚠ CLOUDFLARE_API_TOKEN not set — skipping Cloudflare Worker deploy"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-vercel:
    name: Deploy → Vercel
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: inputs.target == 'vercel'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Deploy to Vercel
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "⚠ VERCEL_TOKEN not set — skipping Vercel deploy"
            exit 0
          fi
          npx vercel --prod --yes --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-summary:
    name: ✅ Deploy Summary
    runs-on: ubuntu-latest
    permissions: {}
    needs: [deploy-railway, deploy-cloudflare]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 🚀 Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Target | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Railway API | ${{ needs.deploy-railway.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cloudflare Worker | ${{ needs.deploy-cloudflare.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
