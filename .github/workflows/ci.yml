name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect project type
        id: detect
        run: |
          if [ -f "package.json" ]; then echo "type=node" >> $GITHUB_OUTPUT
          elif [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then echo "type=python" >> $GITHUB_OUTPUT
          elif [ -f "go.mod" ]; then echo "type=go" >> $GITHUB_OUTPUT
          elif [ -f "wrangler.toml" ]; then echo "type=worker" >> $GITHUB_OUTPUT
          else echo "type=generic" >> $GITHUB_OUTPUT
          fi

      # Python
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        if: steps.detect.outputs.type == 'python'
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install Python dependencies
        if: steps.detect.outputs.type == 'python'
        run: pip install -r requirements.txt pytest pytest-asyncio httpx --quiet
      - name: Run Python tests
        if: steps.detect.outputs.type == 'python'
        run: python -m pytest tests/ --tb=short -q

      # Node.js / Cloudflare Worker
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        if: steps.detect.outputs.type == 'node' || steps.detect.outputs.type == 'worker'
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
        if: steps.detect.outputs.type == 'node' || steps.detect.outputs.type == 'worker'
        continue-on-error: true
      - run: npm run lint --if-present
        if: steps.detect.outputs.type == 'node' || steps.detect.outputs.type == 'worker'
        continue-on-error: true
      - run: npm test --if-present
        if: steps.detect.outputs.type == 'node' || steps.detect.outputs.type == 'worker'
        continue-on-error: true

      # Go
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        if: steps.detect.outputs.type == 'go'
        with:
          go-version: '1.22'
      - run: go build ./... && go test ./...
        if: steps.detect.outputs.type == 'go'
        continue-on-error: true

      - name: ✅ CI complete
        run: echo "CI passed for ${{ github.repository }}"

  cf-worker-lint:
    name: CF Worker Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: hashFiles('workers/task-dispatcher/package.json') != ''
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: workers/task-dispatcher/package-lock.json
      - name: Install worker deps
        working-directory: workers/task-dispatcher
        run: npm ci
      - name: Typecheck worker
        working-directory: workers/task-dispatcher
        run: npx tsc --noEmit
        continue-on-error: true

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: contains(github.repository, 'blackroad')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
      - run: npm ci 2>/dev/null || true
      - run: npx tsc --noEmit 2>/dev/null || echo "No TypeScript config"
        continue-on-error: true
