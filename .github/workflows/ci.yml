name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check app/ tests/
          mypy app/ --ignore-missing-imports

      - name: Test
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing
        env:
          BLACKROAD_GATEWAY_URL: "http://localhost:8787"
          ENVIRONMENT: "test"

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t blackroad-api:ci .

      - name: Smoke test
        run: |
          docker run -d -p 8000:8000 --name api blackroad-api:ci
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop api
