name: 🔀 Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    name: Auto-Merge Dependabot & Copilot PRs
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      (
        github.actor == 'dependabot[bot]' ||
        github.actor == 'copilot-swe-agent[bot]' ||
        github.actor == 'github-copilot[bot]'
      )
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enable auto-merge
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              console.log('No PR in context');
              return;
            }

            const actor = context.actor;
            const allowedBots = [
              'dependabot[bot]',
              'copilot-swe-agent[bot]',
              'github-copilot[bot]',
            ];

            if (!allowedBots.includes(actor)) {
              console.log(`Actor ${actor} not in allowlist — skipping automerge`);
              return;
            }

            console.log(`Enabling automerge for PR #${pr.number} by ${actor}`);

            try {
              await github.rest.pulls.updateBranch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              });
            } catch (e) {
              console.log(`Branch update skipped: ${e.message}`);
            }

            // Enable auto-merge via GraphQL (required for protected branches)
            const mutation = `
              mutation EnableAutoMerge($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId,
                  mergeMethod: SQUASH
                }) {
                  pullRequest {
                    autoMergeRequest {
                      mergeMethod
                    }
                  }
                }
              }
            `;
            try {
              await github.graphql(mutation, { pullRequestId: pr.node_id });
              console.log(`✅ Auto-merge enabled for PR #${pr.number}`);
            } catch (e) {
              console.log(`Auto-merge via GraphQL failed (may not be enabled on repo): ${e.message}`);
              // Fallback: attempt direct merge if CI has passed
              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                });
                console.log(`✅ PR #${pr.number} merged directly`);
              } catch (mergeErr) {
                console.log(`Direct merge skipped: ${mergeErr.message}`);
              }
            }

      - name: Approve Dependabot PR
        if: github.actor == 'dependabot[bot]'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              event: 'APPROVE',
              body: '✅ Auto-approved by BlackRoad bot — dependency update from Dependabot.',
            });
            console.log(`✅ Approved PR #${pr.number}`);

  label-automerge:
    name: Auto-Merge Labeled PRs
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'automerge'
    steps:
      - name: Enable auto-merge on labeled PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const mutation = `
              mutation EnableAutoMerge($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId,
                  mergeMethod: SQUASH
                }) {
                  pullRequest { number }
                }
              }
            `;
            try {
              await github.graphql(mutation, { pullRequestId: pr.node_id });
              console.log(`✅ Auto-merge enabled for PR #${pr.number} (label triggered)`);
            } catch (e) {
              console.log(`Auto-merge not available: ${e.message}`);
            }
